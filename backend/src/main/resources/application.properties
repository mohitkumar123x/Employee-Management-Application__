# Import Environment Variables from config.properties file
spring.config.import=optional:file:config.properties

# Spring Boot Application Configuration
spring.application.name=Employee-Management

# MySQL Database Configuration (env-driven, Render-friendly)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DB:employee_management}?ssl-mode=${MYSQL_SSL_MODE:DISABLED}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQL_USER:root}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQL_PASSWORD:password}}

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB Configuration (optional, env-driven)
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:${MONGO_URI:mongodb://localhost:27017/employee_management}}

# Server Configuration (Render injects PORT)
server.port=${PORT:8080}